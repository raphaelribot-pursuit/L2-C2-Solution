# Build installable Wisper bundles when a version tag is pushed (e.g. v0.2.0-beta.1).

name: Release

on:
  push:
    tags:
      - "v*"

defaults:
  run:
    working-directory: wisper

env:
  CARGO_TERM_COLOR: always
  MACOSX_DEPLOYMENT_TARGET: "10.15"
  CMAKE_OSX_DEPLOYMENT_TARGET: "10.15"

jobs:
  build-windows-cuda:
    name: Windows CUDA installer
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: wisper/package-lock.json
      - uses: dtolnay/rust-toolchain@stable
      - name: Install CUDA Toolkit
        uses: Jimver/cuda-toolkit@d34c721df9930a1f5375dbe0f6e52af57c7f56e1 # v0.2.15
        with:
          cuda: "12.6.3"
          sub-packages: '["nvcc", "cudart", "cublas", "cublasLt"]'
          method: network
      - name: Install frontend dependencies
        run: npm ci
      - name: Build frontend
        run: npm run build
      - name: Build Tauri bundle (gpu-cuda)
        run: npm run tauri -- build -- --features gpu-cuda
      - name: Upload Windows bundle
        uses: actions/upload-artifact@v4
        with:
          name: wisper-windows-cuda
          path: |
            wisper/src-tauri/target/release/bundle/**/*.msi
            wisper/src-tauri/target/release/bundle/**/*.exe

  build-linux-vulkan:
    name: Linux Vulkan bundle
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: wisper/package-lock.json
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake pkg-config libssl-dev libvulkan-dev vulkan-tools \
            libasound2-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev
      - uses: humbletim/install-vulkan-sdk@v1.2
        with:
          version: 1.4.309.0
          cache: true
      - name: Install frontend dependencies
        run: npm ci
      - name: Build frontend
        run: npm run build
      - name: Build Tauri bundle (gpu-vulkan)
        run: npm run tauri -- build -- --features gpu-vulkan
      - name: Upload Linux bundle
        uses: actions/upload-artifact@v4
        with:
          name: wisper-linux-vulkan
          path: |
            wisper/src-tauri/target/release/bundle/**/*.deb
            wisper/src-tauri/target/release/bundle/**/*.AppImage

  build-macos:
    name: macOS bundle
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: wisper/package-lock.json
      - uses: dtolnay/rust-toolchain@stable
      - name: Install frontend dependencies
        run: npm ci
      - name: Build frontend
        run: npm run build
      - name: Build Tauri bundle (Metal default)
        run: npm run tauri -- build
      - name: Upload macOS bundle
        uses: actions/upload-artifact@v4
        with:
          name: wisper-macos
          path: |
            wisper/src-tauri/target/release/bundle/**/*.dmg
            wisper/src-tauri/target/release/bundle/**/*.app

  github-release:
    name: Publish GitHub Release
    needs: [build-windows-cuda, build-linux-vulkan, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
          body: |
            ## Install notes

            1. Pick the installer for your platform (NVIDIA → Windows CUDA, AMD/Intel → Linux Vulkan, Mac → macOS).
            2. Download a Whisper GGML model after install — models are not bundled. See `wisper/scripts/download-model.ps1` in the repo.
            3. For YouTube/URL import, install [yt-dlp](https://github.com/yt-dlp/yt-dlp) separately.
            4. For full-length MP3 import, install [ffmpeg](https://ffmpeg.org/) (symphonia can truncate some VBR MP3s; Wisper falls back to ffmpeg when installed).

            See the repo README — **Which build should I use?** — for which artifact matches your GPU.
