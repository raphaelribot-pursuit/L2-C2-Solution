# Build installable Wisper bundles when a version tag is pushed (e.g. v0.2.0-beta.1).

name: Release

on:
  push:
    tags:
      - "v*"

defaults:
  run:
    working-directory: wisper

env:
  CARGO_TERM_COLOR: always
  MACOSX_DEPLOYMENT_TARGET: "10.15"
  CMAKE_OSX_DEPLOYMENT_TARGET: "10.15"

jobs:
  build-windows-cuda:
    name: Windows CUDA installer
    runs-on: windows-2022
    env:
      WISPER_EP_BUILD_ROOT: C:\wisper-build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: wisper/package-lock.json
      - uses: dtolnay/rust-toolchain@stable
      - name: Install CUDA Toolkit
        uses: Jimver/cuda-toolkit@v0.2.35
        id: cuda-toolkit
        with:
          cuda: "12.6.0"
          method: network
          sub-packages: '["nvcc","cudart","cublas","cublas_dev","visual_studio_integration"]'
          use-github-cache: false
          use-local-cache: false
      - name: Verify CUDA
        shell: pwsh
        run: |
          $bin = Join-Path $env:CUDA_PATH "bin"
          Add-Content -Path $env:GITHUB_PATH -Value $bin
          $env:PATH = "$bin;$env:PATH"
          nvcc -V
      - uses: ilammy/msvc-dev-cmd@v1
      - name: Prepare ExternalProject build root
        shell: pwsh
        run: |
          if (Test-Path $env:WISPER_EP_BUILD_ROOT) {
            Remove-Item -Recurse -Force $env:WISPER_EP_BUILD_ROOT
          }
          New-Item -ItemType Directory -Force -Path $env:WISPER_EP_BUILD_ROOT | Out-Null
      - name: Install frontend dependencies
        run: npm ci
      - name: Build frontend
        run: npm run build
      - name: Bundle yt-dlp for installer
        shell: pwsh
        run: ./scripts/download-yt-dlp-bundle.ps1
      - name: Build Tauri bundle (gpu-cuda)
        run: npm run tauri -- build -- --features gpu-cuda
      - name: Upload Windows bundle
        uses: actions/upload-artifact@v4
        with:
          name: wisper-windows-cuda
          path: wisper/target/release/bundle/nsis/*.exe
          if-no-files-found: error

  build-linux-vulkan:
    name: Linux Vulkan bundle
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: wisper/package-lock.json
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake pkg-config libssl-dev libvulkan-dev vulkan-tools \
            libasound2-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev
      - uses: humbletim/install-vulkan-sdk@v1.2
        with:
          version: 1.4.309.0
          cache: true
      - name: Install frontend dependencies
        run: npm ci
      - name: Build frontend
        run: npm run build
      - name: Bundle yt-dlp for installer
        run: bash scripts/download-yt-dlp-bundle.sh
      - name: Build Tauri bundle (gpu-vulkan)
        run: npm run tauri -- build -- --features gpu-vulkan
      - name: Upload Linux bundle
        uses: actions/upload-artifact@v4
        with:
          name: wisper-linux-vulkan
          path: wisper/target/release/bundle/appimage/*.AppImage
          if-no-files-found: error

  build-macos:
    name: macOS bundle (Intel + Apple Silicon)
    runs-on: macos-15
    env:
      # Newer GitHub runner images can hang DMG AppleScript when this is true.
      TAURI_BUNDLER_DMG_IGNORE_CI: "false"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: wisper/package-lock.json
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin
      - name: Install frontend dependencies
        run: npm ci
      - name: Build frontend
        run: npm run build
      - name: Bundle yt-dlp for installer
        run: bash scripts/download-yt-dlp-bundle.sh
      - name: Prepare macOS DMG bundler
        run: |
          # Detach stale Wisper DMG mounts from prior failed runs on shared runners.
          hdiutil info 2>/dev/null | awk '/\/Volumes\/Wisper/ {print $1}' | while read -r dev; do
            hdiutil detach "$dev" -force 2>/dev/null || true
          done
          pkill -f diskimages-helper 2>/dev/null || true
      - name: Build Tauri bundle (Metal, Apple Silicon)
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            echo "Apple Silicon bundle attempt ${attempt}/3"
            if npm run tauri -- build -- --verbose; then
              exit 0
            fi
            echo "DMG bundling failed; cleaning up before retry..."
            hdiutil info 2>/dev/null | awk '/\/Volumes\/Wisper/ {print $1}' | while read -r dev; do
              hdiutil detach "$dev" -force 2>/dev/null || true
            done
            pkill -f diskimages-helper 2>/dev/null || true
            rm -f target/release/bundle/dmg/*.dmg 2>/dev/null || true
            sleep 5
          done
          exit 1
      - name: Build Tauri bundle (Metal, Intel)
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            echo "Intel bundle attempt ${attempt}/3"
            if npm run tauri -- build --target x86_64-apple-darwin -- --verbose; then
              exit 0
            fi
            echo "DMG bundling failed; cleaning up before retry..."
            hdiutil info 2>/dev/null | awk '/\/Volumes\/Wisper/ {print $1}' | while read -r dev; do
              hdiutil detach "$dev" -force 2>/dev/null || true
            done
            pkill -f diskimages-helper 2>/dev/null || true
            rm -f target/x86_64-apple-darwin/release/bundle/dmg/*.dmg 2>/dev/null || true
            sleep 5
          done
          exit 1
      - name: Upload macOS bundles
        uses: actions/upload-artifact@v4
        with:
          name: wisper-macos
          path: |
            wisper/target/release/bundle/dmg/*.dmg
            wisper/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg
          if-no-files-found: error

  github-release:
    name: Publish GitHub Release
    needs: [build-windows-cuda, build-linux-vulkan, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*.exe
            artifacts/**/*.AppImage
            artifacts/**/*.dmg
          generate_release_notes: true
          body: |
            ## Install notes

            1. Pick the installer for your platform (NVIDIA → Windows CUDA, AMD/Intel GPU → Linux Vulkan, Mac → `_x64.dmg` on Intel Mac or `_aarch64.dmg` on Apple Silicon).
            2. Download a Whisper GGML model after install — models are not bundled. See `wisper/scripts/download-model.ps1` in the repo.
            3. **URL import:** installers include **yt-dlp**. You can also install or update it from **Advanced options → Install yt-dlp** (saved under app data).
            4. **MP3 / video files:** install **ffmpeg** from **Advanced options → Install ffmpeg** for full-length decode when the built-in reader falls short (or use ffmpeg from your PATH).

            See the repo README — **Which build should I use?** — for which artifact matches your GPU.
